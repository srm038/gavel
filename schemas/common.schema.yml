$schema: http://json-schema.org/draft-07/schema#
$id: common.schema.yml
title: RONR Common Definitions
description: Shared definitions for minutes and agenda schemas
type: object

definitions:
  meeting_metadata:
    type: object
    required:
      - title
      - date
      - meeting_type
      - type
    properties:
      type:
        type: string
        enum:
          - agenda
          - minutes
        description: Document type
      title:
        type: string
        description: Name of the organization
      date:
        type: string
        format: date
        description: Date of the meeting (YYYY-MM-DD)
      meeting_type:
        type: string
        enum:
          - Regular
          - Special
          - Annual
          - Adjourned
          - Executive Session
        description: Type of meeting per RONR
      location:
        type: string
        description: Physical or virtual location
      status:
        type: string
        enum:
          - Draft
          - Approved
        description: Document status

  ceremony:
    type: object
    description: A ceremony or ritual item (prayer, pledge, invocation, etc.)
    properties:
      by:
        type: string
        description: Person who led the ceremony
      description:
        type: string
        description: Notes about the ceremony

  motion:
    type: object
    description: A motion without results (pre-meeting or placeholder)
    properties:
      type:
        type: string
        default: Motion
        description: Specific RONR motion name in order of precedence
        enum:
          - Fix the Time to Adjourn
          - Adjourn
          - Take a Recess
          - Raise a Question of Privilege
          - Call for the Orders of the Day
          - Lay on the Table
          - Previous Question
          - Limit or Extend Debate
          - Postpone to a Certain Time
          - Commit
          - Refer
          - Amend
          - Postpone Indefinitely
          - Motion
          - Enter Executive Session
          - Rise from Executive Session
          - Take from the Table
          - Reconsider
          - Rescind
          - Point of Order
          - Appeal
          - Suspend the Rules
          - Division of Assembly
          - Division of the Question
          - Object to Consideration of a Question
          - Parliamentary Inquiry
          - Request for Information
          - Request to Withdraw a Motion
          - Request to be Excused from a Duty
      text:
        type: string
        description: Exact wording of the motion
      by:
        type: string
        description: Member who made the motion
      seconded:
        type: boolean
        description: Whether the motion was seconded

  minutes_approval:
    type: object
    description: Approval of previous meeting's minutes
    required:
      - date
    properties:
      date:
        type: string
        format: date
        description: Date of the meeting whose minutes were approved
      motion:
        type: object
        properties:
          by:
            type: string
            description: Member who moved approval
          seconded:
            type: boolean
  election:
    type: object
    description: An election without results
    required:
      - office
    properties:
      office:
        type: string
        description: Title of the office
      nominees:
        type: array
        description: Nominees for the office
        items:
          type: object
          properties:
            name:
              type: string
            nominated_by:
              type: string
